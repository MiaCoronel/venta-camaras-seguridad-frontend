<section class="contenedor">
  <h2>Cámaras de Seguridad</h2>

  @if (loading()) {
    <p>Cargando catálogo...</p>
  }

  @if (error()) {
    <p class="alerta-error">{{ error() }}</p>
  }

  @if (!loading() && !error()) {
    <div class="grid">
      @for (camara of camaras(); track camara.id) {
        <app-tarjeta-camara [camara]="camara" />
      }
    </div>
  }
</section>
